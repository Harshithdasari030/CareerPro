<!DOCTYPE html>
<html>
<head>
  <title>CareerForge - JD Analyzer</title>
  <style>
    :root {
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', system-ui, Arial, sans-serif;
      color: #f7faff;
      background: linear-gradient(135deg, #041b3d 0%, #1f2f67 35%, #2f1f5e 65%, #0f112d 100%);
      overflow-x: hidden;
      position: relative;
      text-align: center;
      padding: 48px 20px;
      animation: pageGlow 20s ease infinite;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 15% 20%, rgba(94, 173, 255, 0.18), transparent 22%),
                  radial-gradient(circle at 85% 15%, rgba(186, 106, 255, 0.14), transparent 18%),
                  radial-gradient(circle at 50% 90%, rgba(96, 255, 226, 0.12), transparent 20%);
      pointer-events: none;
      z-index: 0;
    }

    h1 {
      margin: 0 auto 28px;
      max-width: 960px;
      font-size: clamp(2.5rem, 5vw, 4rem);
      line-height: 1.02;
      letter-spacing: -0.04em;
      text-shadow: 0 24px 50px rgba(0, 0, 0, 0.32);
      position: relative;
      z-index: 1;
      animation: textGlow 8s ease-in-out infinite;
    }

    textarea {
      width: min(100%, 860px);
      min-height: 220px;
      padding: 22px 24px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: #eef4ff;
      font-size: 1rem;
      line-height: 1.7;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
      outline: none;
      backdrop-filter: blur(16px);
      transition: transform 0.28s ease, border-color 0.28s ease, box-shadow 0.28s ease;
      position: relative;
      z-index: 1;
    }

    textarea:focus {
      transform: translateY(-2px);
      border-color: rgba(118, 187, 255, 0.64);
      box-shadow: 0 32px 80px rgba(28, 112, 255, 0.24);
    }

    button {
      padding: 16px 32px;
      margin-top: 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #5ddcff 0%, #7048ff 45%, #ff6fbe 100%);
      background-size: 240% 240%;
      color: white;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 28px 60px rgba(121, 79, 255, 0.22);
      transition: transform 0.25s ease, box-shadow 0.25s ease, filter 0.25s ease;
      animation: buttonShift 4s ease infinite;
      position: relative;
      z-index: 1;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 34px 80px rgba(121, 79, 255, 0.32);
      filter: brightness(1.05);
      animation-play-state: paused;
    }

    .card {
      width: min(100%, 860px);
      margin: 28px auto 0;
      padding: 28px 30px;
      border-radius: 30px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 40px 100px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(22px);
      text-align: left;
      position: relative;
      z-index: 1;
      animation: cardEnter 0.8s ease both;
    }

    .card h3 {
      margin: 0 0 10px;
      font-size: 0.95rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #a3c8ff;
    }

    .card p {
      margin: 0 0 18px;
      color: #e8f2ff;
      line-height: 1.75;
      word-break: break-word;
    }

    .card p:last-child {
      margin-bottom: 0;
    }

    @keyframes pageGlow {
      0%, 100% {
        background: linear-gradient(135deg, #041b3d 0%, #1f2f67 35%, #2f1f5e 65%, #0f112d 100%);
      }
      50% {
        background: linear-gradient(135deg, #0b234f 0%, #2a3d7f 35%, #6f3ab1 65%, #0e1232 100%);
      }
    }

    @keyframes textGlow {
      0%, 100% {
        text-shadow: 0 24px 50px rgba(0, 0, 0, 0.32);
      }
      50% {
        text-shadow: 0 28px 64px rgba(93, 184, 255, 0.32);
      }
    }

    @keyframes buttonShift {
      0%, 100% {
        background-position: 0% 50%;
      }
      50% {
        background-position: 100% 50%;
      }
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<script>
async function analyzeJD() {
  const jd = document.getElementById("jd").value;

  const res = await fetch("http://localhost:5000/test-ai", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ jd })
  });

  const data = await res.json();

  document.getElementById("skills").innerText = data.skills.join(", ");
  document.getElementById("keywords").innerText = data.keywords.join(", ");
  document.getElementById("summary").innerText = data.summary;
}
</script>
<body>

  <h1> CareerForge JD Analyzer</h1>

  <textarea id="jd" placeholder="Paste Job Description here..."></textarea>
  <br>
  <button onclick="analyzeJD()">Analyze</button>

  <div class="card">
    <h3>Skills:</h3>
    <p id="skills"></p>

    <h3>Keywords:</h3>
    <p id="keywords"></p>

    <h3>Summary:</h3>
    <p id="summary"></p>
  </div>

  <script>
    async function analyzeJD() {
      const res = await fetch("http://localhost:5001/test-ai");
      const data = await res.json();

      document.getElementById("skills").innerText = data.skills.join(", ");
      document.getElementById("keywords").innerText = data.keywords.join(", ");
      document.getElementById("summary").innerText = data.summary;
    }
  </script>

</body>
